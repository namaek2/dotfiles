# Hypridle 
# Original config submitted by https://github.com/SherLock707                                                       
                                                      

general {
}


# Screenlock
listener {
    timeout = 36000
    on-timeout = ~/.config/hypr/scripts/LockScreen.sh # command to run when timeout has passed
    on-resume = notify-send "⏰Time to mix 🖥️codes and change lives...!"  # command to run when activity is detected after timeout has fired.
}


listener {
    timeout = 10800
    on-timeout = systemctl suspend
}
